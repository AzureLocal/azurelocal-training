name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CNAME'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docs:
    uses: AzureLocal/platform/.github/workflows/reusable-mkdocs-deploy.yml@main
    with:
      pip-packages: 'mkdocs-material'
