name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CNAME'
  workflow_dispatch:

# Reusable workflow needs pages:write + id-token:write for actions/deploy-pages@v4.
# Caller must grant these explicitly — they are NOT part of the default token scope.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: AzureLocal/platform/.github/workflows/reusable-mkdocs-deploy.yml@main
    with:
      pip-packages: 'mkdocs-material'
