name: Slide Export

# Converts PowerPoint decks under slides/<module>/*.pptx into PDF + per-slide PNGs.
# Uses LibreOffice headless on Ubuntu runners — no Microsoft Office licensing required.

on:
  push:
    branches: [main]
    paths:
      - 'slides/**/*.pptx'
  workflow_dispatch:
    inputs:
      module:
        description: Module folder name (e.g., 05-compute) or 'all'
        type: string
        default: 'all'

permissions:
  contents: write   # to commit exported PDFs and PNGs

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install LibreOffice + Poppler (pdftoppm)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice poppler-utils

      - name: Determine target modules
        id: targets
        shell: bash
        run: |
          mod="${{ github.event.inputs.module }}"
          if [ -z "$mod" ] || [ "$mod" = "all" ]; then
            mapfile -t targets < <(find slides -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          else
            targets=("$mod")
          fi
          printf 'targets=%s\n' "${targets[*]}" >> "$GITHUB_OUTPUT"
          echo "Will process: ${targets[*]}"

      - name: Export PPTX → PDF + PNGs
        shell: bash
        run: |
          set -euo pipefail
          modules="${{ steps.targets.outputs.targets }}"
          for mod in $modules; do
            dir="slides/$mod"
            [ -d "$dir" ] || { echo "Skipping missing $dir"; continue; }
            mapfile -t decks < <(find "$dir" -maxdepth 1 -type f -name '*.pptx')
            [ "${#decks[@]}" -eq 0 ] && { echo "No .pptx in $dir"; continue; }
            for deck in "${decks[@]}"; do
              echo "::group::$deck"
              libreoffice --headless --convert-to pdf --outdir "$dir" "$deck"
              pdf="${deck%.pptx}.pdf"
              if [ -f "$pdf" ]; then
                mkdir -p "$dir/png"
                pdftoppm -png -r 150 "$pdf" "$dir/png/slide"
              fi
              echo "::endgroup::"
            done
          done

      - name: Commit exports
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add 'slides/**/*.pdf' 'slides/**/png/*.png' || true
          if git diff --staged --quiet; then
            echo "No export changes to commit."
            exit 0
          fi
          git commit -m "chore(slides): auto-export PDF + PNG previews"
          git push
