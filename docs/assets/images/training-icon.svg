<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A3A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="200" height="200" rx="38" ry="38" fill="url(#bgGrad)"/>

  <g opacity="0.08" stroke="white" stroke-width="0.8">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <g transform="translate(100,32)" filter="url(#shadow)">
    <polygon points="0,-14 14,-5 10,12 0,7 -10,12 -14,-5" fill="#16A085" stroke="#117A65" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="white">T</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="100" cy="100" r="46" fill="white"/>
    <circle cx="100" cy="100" r="38" fill="url(#bgGrad)"/>

    <!-- Open book -->
    <!-- Left page -->
    <path d="M100,82 L76,88 L76,118 L100,114 Z" fill="#16A085" opacity="0.70"/>
    <!-- Right page -->
    <path d="M100,82 L124,88 L124,118 L100,114 Z" fill="#16A085" opacity="0.50"/>
    <!-- Spine -->
    <line x1="100" y1="82" x2="100" y2="114" stroke="#16A085" stroke-width="2.2" opacity="0.95"/>
    <!-- Text lines on left page -->
    <line x1="80" y1="95" x2="97" y2="93" stroke="white" stroke-width="1.2" opacity="0.55"/>
    <line x1="80" y1="101" x2="97" y2="99" stroke="white" stroke-width="1.2" opacity="0.45"/>
    <line x1="80" y1="107" x2="97" y2="105" stroke="white" stroke-width="1.2" opacity="0.35"/>
    <!-- Text lines on right page -->
    <line x1="103" y1="93" x2="120" y2="95" stroke="white" stroke-width="1.2" opacity="0.45"/>
    <line x1="103" y1="99" x2="120" y2="101" stroke="white" stroke-width="1.2" opacity="0.35"/>
    <line x1="103" y1="105" x2="120" y2="107" stroke="white" stroke-width="1.2" opacity="0.25"/>
    <!-- Book binding curve at top -->
    <path d="M76,88 Q88,84 100,82 Q112,84 124,88" fill="none" stroke="#16A085" stroke-width="1.5" opacity="0.80"/>

    <circle cx="100" cy="100" r="38" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <text x="100" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="13" fill="white" letter-spacing="1" opacity="0.95">AZURE LOCAL</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="13" fill="#16A085" letter-spacing="2" opacity="0.95">TRAINING</text>
</svg>
