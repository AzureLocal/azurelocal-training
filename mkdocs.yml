site_name: Azure Local Training
site_description: Training materials and guides for Azure Local
site_url: https://azurelocal.github.io/azurelocal-training/
repo_url: https://github.com/AzureLocal/azurelocal-training
repo_name: AzureLocal/azurelocal-training

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - sitemap

extra:
  analytics:
    provider: google
    property: G-2D9XDHSXJW
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/countrycloudboy
      name: CountryCloudBoy on X
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/azurelocal-training
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: Azure Local Community
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; 2026 Azure Local. Designed and maintained by
  <a href="https://www.hybridsolutions.cloud">Hybrid Cloud Solutions</a>.

